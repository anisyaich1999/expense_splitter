<!DOCTYPE html>
<html>
<head>
  <title>Expense Splitter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 10px;
    }

    h2 {
      text-align: center;
      margin: 10px 0 5px 0;
      font-size: 28px;
      color: #2d2a35;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 12px;
      color: #666;
    }

    .container {
      max-width: 750px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .section-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 6px;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #45a049;
    }

    ul {
      padding-left: 15px;
      margin: 0;
    }

    li {
      background: #f9f9f9;
      margin: 4px 0;
      padding: 6px;
      border-radius: 5px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-x {
      color: #e74c3c;
      cursor: pointer;
      font-weight: bold;
      font-size: 22px;
      margin-left: 10px;
      user-select: none;
      transition: 0.15s;
    }

    .delete-x:hover {
      transform: scale(1.2);
    }

    .full {
      grid-column: span 2;
    }
  </style>
</head>

<body>

<h2>💸 Expense Splitter</h2>
<p class="subtitle">Track shared expenses & settle balances easily</p>

<div class="container">

  <!-- Add User -->
  <div class="card">
    <div class="section-title">Add User</div>
    <input id="name" placeholder="Name" />
    <button onclick="addUser()">Add User</button>
  </div>

  <!-- Add Expense -->
  <div class="card">
    <div class="section-title">Add Expense</div>

    <input id="title" placeholder="Title" />
    <input id="amount" placeholder="Amount" />
    <input id="paidBy" placeholder="Paid By" />
    <input id="participants" placeholder="Participants" />

    <button onclick="addExpense()">Add Expense</button>
  </div>

  <!-- Balances -->
  <div class="card">
    <div class="section-title">Users & Balances</div>
    <ul id="balanceList"></ul>
  </div>

  <!-- Expenses -->
  <div class="card">
    <div class="section-title">Expenses</div>
    <ul id="expenseList"></ul>
  </div>

  <!-- Settle Up -->
  <div class="card full">
    <div class="section-title">Settle Up</div>
    <button onclick="settleUp()">Calculate Settlements</button>
    <ul id="settlementList"></ul>
  </div>

</div>

<script>
async function addUser() {
  const name = document.getElementById("name").value;

  await fetch("https://expense-splitter-zll6.onrender.com/users", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name })
  });

  document.getElementById("name").value = "";
  loadBalances();
}

async function deleteUser(name) {
  await fetch(`https://expense-splitter-zll6.onrender.com/users/${name}`, {
    method: "DELETE"
  });

  loadBalances();
  loadExpenses();
}

async function addExpense() {
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;
  const paidBy = document.getElementById("paidBy").value;
  const participants = document.getElementById("participants").value.split(",");

  await fetch("https://expense-splitter-zll6.onrender.com/expenses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      amount: Number(amount),
      paidBy,
      participants
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("paidBy").value = "";
  document.getElementById("participants").value = "";

  loadBalances();
  loadExpenses();
}

async function deleteExpense(id) {
  await fetch(`https://expense-splitter-zll6.onrender.com/expenses/${id}`, {
    method: "DELETE"
  });

  loadBalances();
  loadExpenses();
}

async function loadBalances() {
  const res = await fetch("https://expense-splitter-zll6.onrender.com/balances");
  const data = await res.json();

  const list = document.getElementById("balanceList");
  list.innerHTML = "";

  data.forEach(user => {
    const li = document.createElement("li");
    li.innerText = `${user.name} → €${user.balance}`;

    const x = document.createElement("span");
    x.innerText = "×";
    x.className = "delete-x";
    x.onclick = () => deleteUser(user.name);

    li.appendChild(x);
    list.appendChild(li);
  });
}

async function loadExpenses() {
  const res = await fetch("https://expense-splitter-zll6.onrender.com/expenses");
  const data = await res.json();

  const list = document.getElementById("expenseList");
  list.innerHTML = "";

  data.forEach(exp => {
    const li = document.createElement("li");

    const text = document.createElement("div");
    text.innerHTML = `
      <b>${exp.title}</b> - €${exp.amount} <br>
      Paid by: <b>${exp.paidBy}</b> <br>
      Split: ${exp.participants.join(", ")}
    `;

    const x = document.createElement("span");
    x.innerText = "×";
    x.className = "delete-x";
    x.onclick = () => deleteExpense(exp._id);

    li.appendChild(text);
    li.appendChild(x);

    list.appendChild(li);
  });
}

async function settleUp() {
  const res = await fetch("https://expense-splitter-zll6.onrender.com/settlements");
  const data = await res.json();

  const list = document.getElementById("settlementList");
  list.innerHTML = "";

  data.forEach(s => {
    const li = document.createElement("li");
    li.innerText = `${s.from} pays ${s.to} → €${s.amount}`;
    list.appendChild(li);
  });
}

loadBalances();
loadExpenses();
</script>

</body>
</html>
